<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded square background -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#00de5a"/>

  <!-- Cricket silhouette — simplified, bold, centered -->
  <!-- Abdomen -->
  <ellipse cx="50" cy="62" rx="5" ry="10" fill="#14171a"/>
  <!-- Thorax -->
  <ellipse cx="50" cy="47" rx="7" ry="8" fill="#14171a"/>
  <!-- Head -->
  <circle cx="50" cy="34" r="6" fill="#14171a"/>

  <!-- Antennae -->
  <line x1="47" y1="29" x2="36" y2="16" stroke="#14171a" stroke-width="3" stroke-linecap="round"/>
  <line x1="53" y1="29" x2="64" y2="16" stroke="#14171a" stroke-width="3" stroke-linecap="round"/>

  <!-- Wings -->
  <path d="M 43 45 Q 30 38 32 52 Q 40 50 50 52 Z" fill="#14171a"/>
  <path d="M 57 45 Q 70 38 68 52 Q 60 50 50 52 Z" fill="#14171a"/>

  <!-- Front legs -->
  <line x1="43" y1="44" x2="28" y2="48" stroke="#14171a" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="57" y1="44" x2="72" y2="48" stroke="#14171a" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Mid legs -->
  <line x1="43" y1="50" x2="26" y2="57" stroke="#14171a" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="57" y1="50" x2="74" y2="57" stroke="#14171a" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Hind legs (longer, angled back) -->
  <line x1="44" y1="58" x2="27" y2="72" stroke="#14171a" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="56" y1="58" x2="73" y2="72" stroke="#14171a" stroke-width="2.8" stroke-linecap="round"/>
</svg>
